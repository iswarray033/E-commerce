      <!--Topbar -->

      <!--Main Menubar-->
      <nav class="navbar navbar-expand-lg">
        <div class="container">
          <a class="navbar-brand" href="#"
            ><img height="70px" src="Assets/images/logo.png" alt="logo"
          /></a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav m-auto mb-2 mb-lg-0 gap-3">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Product.html">Products</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Product_details.html"
                  >Product-Details</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="cart.html">Cart</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Signup.html">SignUp</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="Login.html">Login</a>
              </li>
            </ul>
            <form class="d-flex align-items-center" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />

              <button class="btn btn-outline-success" type="submit">
                Search
              </button>

              <a href="#" class="text-dark position-relative ms-3">
                <i class="bi bi-cart fs-2"></i>

                <span
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                >
                  3
                </span>
              </a>
            </form>
          </div>
        </div>
      </nav>
    </header>

    <!--sign Up Section-->
    <section
      class="container mt-3 bg-info-subtle p-4 rounded-3 w-100"
      style="max-width: 500px"
    >
      <h3 class="text-center mb-3 fw-bold">Sign Up</h3>

      <form class="" onsubmit="abc()">
        <div class="d-flex gap-3">
          <input
            class="form-control"
            type="text"
            placeholder="First Name"
            required
          />
          <input
            class="form-control"
            type="text"
            placeholder="Last Name"
            required
          />
        </div>
        <input
          class="form-control my-3"
          type="tel"
          placeholder="Phone"
          maxlength="11"
          pattern="[0-9]{11}"
          required
        />
        <input
          class="form-control my-3"
          type="email"
          placeholder="Email"
          required
        />
        <input
          class="form-control my-3"
          type="text"
          placeholder="Username"
          required
        />

        <input
          class="form-control my-3"
          type="password"
          placeholder="password"
          required
        />

        <div class="text-center">
          <input
            class="btn btn-primary my-3 px-4"
            type="submit"
            value="Submit"
          />
        </div>
      </form>
    </section>

    <footer class="text-center bg-dark text-white py-4 mt-4">
      &copy;-2026 all reserved E-comerce shop
      <p id="time"></p>
